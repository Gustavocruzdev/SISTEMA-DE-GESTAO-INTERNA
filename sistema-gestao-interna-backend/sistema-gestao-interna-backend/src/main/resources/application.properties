spring.application.name=sistema-gestao-interna-backend

# Configurações do MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/nexusdb?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ⚠️ Altere aqui com o seu usuário e senha do MySQL
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true